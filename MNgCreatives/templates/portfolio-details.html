{% extends 'starter-page.html' %}
{% load static %}

{% block body %}

<main class="main">

    <!-- Portfolio Details Section -->
    <section id="portfolio-details" class="portfolio-details section">

      <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="row justify-content-between">

          <div class="col-lg-8" data-aos="fade-right" data-aos-delay="200">
            <div class="portfolio-details-content">
              <h2>Project Title</h2>
              <p class="description">Project description goes here...</p>

              <div class="portfolio-gallery">
                <img src="{% static 'assets/img/portfolio/portfolio-1.webp' %}" alt="Project Image" class="img-fluid">
                <img src="{% static 'assets/img/portfolio/portfolio-2.webp' %}" alt="Project Image" class="img-fluid">
                <img src="{% static 'assets/img/portfolio/portfolio-3.webp' %}" alt="Project Image" class="img-fluid">
              </div>
            </div>
          </div>

          <div class="col-lg-4" data-aos="fade-left" data-aos-delay="300">
            <div class="portfolio-info">
              <h3>Project Information</h3>
              <ul>
                <li><strong>Client</strong>: John Doe</li>
                <li><strong>Category</strong>: Web Design</li>
                <li><strong>Date</strong>: January 2023</li>
                <li><strong>URL</strong>: <a href="#">https://example.com</a></li>
              </ul>
            </div>
          </div>

        </div>

      </div>

    </section><!-- /Portfolio Details Section -->

  </main><!-- End #main -->

{% endblock %}

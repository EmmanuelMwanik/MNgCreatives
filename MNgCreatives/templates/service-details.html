{% extends 'starter-page.html' %}
{% load static %}

{% block body %}

<main class="main">

    <!-- Service Details Section -->
    <section id="service-details" class="service-details section">

      <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="row justify-content-between">

          <div class="col-lg-8" data-aos="fade-right" data-aos-delay="200">
            <div class="service-details-content">
              <h2>Service Title</h2>
              <p class="description">Service description goes here...</p>

              <div class="service-gallery">
                <img src="{% static 'assets/img/service/service-1.webp' %}" alt="Service Image" class="img-fluid">
                <img src="{% static 'assets/img/service/service-2.webp' %}" alt="Service Image" class="img-fluid">
                <img src="{% static 'assets/img/service/service-3.webp' %}" alt="Service Image" class="img-fluid">
              </div>
            </div>
          </div>

          <div class="col-lg-4" data-aos="fade-left" data-aos-delay="300">
            <div class="service-info">
              <h3>Service Information</h3>
              <ul>
                <li><strong>Duration</strong>: 2-3 weeks</li>
                <li><strong>Price</strong>: $5,000 - $10,000</li>
                <li><strong>Availability</strong>: Available Now</li>
              </ul>
            </div>
          </div>

        </div>

      </div>

    </section><!-- /Service Details Section -->

  </main><!-- End #main -->

{% endblock %}
